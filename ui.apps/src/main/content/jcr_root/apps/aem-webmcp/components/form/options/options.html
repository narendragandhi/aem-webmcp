<sly data-sly-use.options="com.adobe.cq.wcm.core.components.models.form.Options">
    <fieldset class="cmp-form-options">
        <legend>${options.title}</legend>
        <div data-sly-repeat.item="${options.items}">
            <input type="${options.type}" name="${options.name}" value="${item.value}" id="${item.id}" checked="${item.selected}"/>
            <label for="${item.id}">${item.text}</label>
        </div>
    </fieldset>
</sly>
